<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="東京ディズニーリゾートのバックグラウンドストーリーと写真を紹介するサイト。TDL・TDSの各アトラクションに秘められた物語を深掘りします。">
    <title>TDS BGS & Photography | HOME</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400;1,600&family=Noto+Serif+JP:wght@200;300;400&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
    <style>
        /* --- 昼夜（超・くしゃくしゃ古紙）カラー設定 --- */
        :root {
            --bg-color: #E2D7C5; 
            --text-main: #2D231E; 
            --accent-gold: #8C6239; 
            --border-light: rgba(45, 35, 30, 0.2);
            --img-filter: brightness(0.9) contrast(1.1) sepia(30%);
            --glow-color: rgba(140, 98, 57, 0.2);
            --paper-texture: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='strong-paper'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.015' numOctaves='6' result='noise'/%3E%3CfeDiffuseLighting in='noise' lighting-color='%23f5eee0' surfaceScale='5'%3E%3CfeDistantLight azimuth='50' elevation='45'/%3E%3C/feDiffuseLighting%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23strong-paper)'/%3E%3C/svg%3E");
        }

        img { max-width: 100% !important; height: auto; }
        html { scroll-behavior: smooth; }
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Noto Serif JP', serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 50%, transparent 30%, rgba(0,0,0,0.25) 100%), var(--paper-texture);
            background-size: cover;
            /* FIX C: background-attachment:fixed はiOS Safariで非対応のため削除。紙テクスチャは .paper-bg(fixed要素)側で描画される */
            color: var(--text-main); line-height: 2.2; overflow-x: hidden;
            transition: background-color 0.8s ease, color 0.8s ease; -webkit-font-smoothing: antialiased;
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
                scroll-behavior: auto !important;
            }
        }

        /* 背景固定レイヤー（GPU高速化） */
        /* FIX 5: will-change: transform を削除。このレイヤーは変形しないため不要なGPUメモリを消費していた */
        .paper-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2;
            background-image: radial-gradient(circle at 50% 50%, transparent 30%, rgba(0,0,0,0.22) 100%), var(--paper-texture);
            background-size: cover; transform: translate3d(0, 0, 0); pointer-events: none;
        }

        .noise-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 9999; opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        .container { 
            position: relative; z-index: 1;
            width: 100%; max-width: 540px; margin: 0 auto; padding: 40px 25px 100px; 
            background: rgba(244, 237, 226, 0.45); border-radius: 8px; box-shadow: inset 0 0 40px rgba(0,0,0,0.03);
            transition: background 0.8s ease, max-width 0.5s ease;
            /* FIX B: will-change はアニメーション中のみ有効にし、完了後JSで解除する */
            animation: pageLoadFade 1.2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        @keyframes pageLoadFade {
            from { opacity: 0; transform: translate3d(0, 15px, 0); }
            to { opacity: 1; transform: translate3d(0, 0, 0); }
        }

        /* --- ヘッダー --- */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; margin-bottom: 40px; border-bottom: 1px solid var(--border-light); transition: border-color 0.8s; }
        .header-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; letter-spacing: 0.1em; color: var(--text-main); text-decoration: none; transition: color 0.8s; }
        /* FIX D: h1テキストはheader-logoのスタイルを引き継ぎ、ブラウザデフォルトの h1 装飾をリセット */
        .header-logo-text { font-family: inherit; font-size: inherit; font-weight: inherit; letter-spacing: inherit; color: inherit; margin: 0; }
        .profile-btn {
            display: inline-block; text-decoration: none; font-family: 'Montserrat', sans-serif; font-size: 0.7rem; letter-spacing: 0.25em;
            color: var(--accent-gold); border: 1px solid var(--accent-gold); padding: 10px 20px; border-radius: 40px; text-transform: uppercase; transition: all 0.4s ease;
        }
        .profile-btn:hover { background-color: var(--accent-gold); color: var(--bg-color); box-shadow: 0 0 15px var(--glow-color); }

        /* プロフィールアーチ写真枠 */
        .intro-hero { display: flex; flex-direction: column; align-items: center; text-align: center; margin-bottom: 60px; padding-bottom: 40px; border-bottom: 1px solid var(--border-light); }
        .intro-portrait {
            width: 100px !important; height: 120px !important; border-radius: 50px 50px 0 0; overflow: hidden; border: 1px solid var(--accent-gold); box-shadow: 0 8px 20px var(--glow-color); margin-bottom: 30px; background: #111; display: inline-block;
        }
        .intro-portrait img { width: 100px !important; height: 120px !important; object-fit: cover !important; display: block !important; filter: var(--img-filter); }

        .intro-message { font-size: 0.85rem; color: var(--text-main); line-height: 2.2; margin-bottom: 35px; opacity: 0.95; letter-spacing: 0.05em; }

        /* ウォルトの名言 */
        .walt-quote {
            font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; font-style: italic; font-weight: 600; color: var(--accent-gold); line-height: 1.5; margin-bottom: 12px; padding: 0 10px;
        }
        .walt-quote cite { display: block; font-family: 'Montserrat', sans-serif; font-size: 0.55rem; font-style: normal; letter-spacing: 0.2em; text-transform: uppercase; margin-top: 10px; opacity: 0.7; }
        .walt-quote-jp { font-size: 0.7rem; opacity: 0.5; letter-spacing: 0.05em; }

        /* --- 目次 (TOC) --- */
        .toc-box {
            background: rgba(0, 0, 0, 0.02); border: 1px solid var(--border-light); padding: 25px; border-radius: 8px; margin-bottom: 60px; text-align: left;
        }
        .toc-title {
            font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; font-style: italic; color: var(--accent-gold); text-align: center; margin-bottom: 20px; letter-spacing: 0.1em;
        }
        .toc-section { margin-bottom: 15px; }
        .toc-section-title { font-family: 'Montserrat', sans-serif; font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--accent-gold); display: block; margin-bottom: 8px; font-weight: 600; }
        .toc-tags { display: flex; flex-wrap: wrap; gap: 8px; }
        .toc-tags a { background: rgba(45, 35, 30, 0.04); border: 1px solid var(--border-light); padding: 4px 12px; border-radius: 30px; font-size: 0.75rem; color: var(--text-main); text-decoration: none; transition: all 0.3s ease; }
        .toc-tags a:hover { background: var(--text-main); color: var(--bg-color); border-color: var(--text-main); box-shadow: 0 0 10px var(--glow-color); }
        .toc-footer { text-align: center; margin-top: 20px; padding-top: 15px; border-top: 1px dashed var(--border-light); }
        .toc-footer a { font-family: 'Montserrat', sans-serif; font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent-gold); text-decoration: none; font-weight: bold; transition: color 0.3s ease; }
        .toc-footer a:hover { color: var(--text-main); }

        /* --- 記事見出し ＆ レイアウト切替スイッチ --- */
        .list-header { display: flex; justify-content: space-between; align-items: center; margin: 60px 0 30px; border-bottom: 1px solid var(--border-light); padding-bottom: 10px; }
        .section-title { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; font-weight: 300; font-style: italic; color: var(--accent-gold); }
        .layout-toggle { display: flex; gap: 4px; background: rgba(0, 0, 0, 0.05); padding: 4px; border-radius: 20px; border: 1px solid var(--border-light); }
        .layout-toggle button { background: transparent; border: none; color: var(--text-main); font-family: 'Montserrat', sans-serif; font-size: 0.65rem; letter-spacing: 0.1em; padding: 6px 12px; border-radius: 15px; cursor: pointer; transition: all 0.3s ease; text-transform: uppercase; }
        .layout-toggle button.active-toggle { background: var(--accent-gold); color: var(--bg-color); font-weight: 600; }

        /* --- 記事カードリスト --- */
        /* FIX A: transition:all → 個別プロパティに限定（display変更はアニメーション不可なので gap のみ対象にする） */
        .article-list { display: flex; flex-direction: column; gap: 45px; transition: gap 0.4s ease; }
        .article-card {
            text-decoration: none; color: var(--text-main); display: block; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border-light); border-radius: 8px; padding: 25px; transition: all 0.4s ease;
        }
        .article-card:hover { transform: translateY(-5px); border-color: var(--accent-gold); box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        .article-card:focus-visible { outline: 2px solid var(--accent-gold); outline-offset: 4px; border-radius: 8px; }

        /* FIX 4: aspect-ratio のトランジションを削除（ブラウザサポート不安定）。
           代わりに height をアニメーションさせてレイアウト崩れを防ぐ */
        .img-wrapper { width: 100%; aspect-ratio: 3 / 2; border-radius: 4px; overflow: hidden; margin-bottom: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.15); }
        .img-wrapper img { width: 100%; height: 100%; object-fit: cover; filter: var(--img-filter); transition: transform 1.5s ease; }
        .article-card:hover .img-wrapper img { transform: scale(1.05); }
        
        /* 縦長写真を綺麗に収めるためのトリミング調整 */
        .fs-img-align { object-position: center 15% !important; }
        .btm-img-align { object-position: center 90% !important; }
        .bb-img-align { object-position: center 10% !important; }
        .sm-img-align { object-position: center 45% !important; }
        .soarin-img-align { object-position: center 25% !important; }
        .tl-img-align { object-position: center 50% !important; }
        .indy-img-align { object-position: center 30% !important; }

        /* S.E.A.カード専用 */
        .sea-thumbnail-bg {
            background-color: #0b1523 !important;
            display: flex; justify-content: center; align-items: center;
        }
        .sea-thumbnail-bg .sea-mini-crest {
            width: 90px; height: 90px; border-radius: 50%;
            border: 1.5px dashed var(--accent-gold); display: flex; justify-content: center; align-items: center;
        }
        .sea-thumbnail-bg .sea-mini-letters {
            font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 700; color: #fff;
        }

        .card-tag { font-family: 'Montserrat', sans-serif; font-size: 0.65rem; letter-spacing: 0.25em; color: var(--accent-gold); text-transform: uppercase; margin-bottom: 8px; }
        .article-card h2 { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; font-weight: 400; color: var(--text-main); margin-bottom: 15px; letter-spacing: 0.05em; transition: color 0.8s; }
        /* FIX A: transition:all → opacity と font-size のみ対象にする */
        .article-card p { font-size: 0.8rem; opacity: 0.7; line-height: 2; margin-bottom: 25px; transition: opacity 0.4s ease; }
        .read-btn { font-family: 'Montserrat', sans-serif; font-size: 0.75rem; letter-spacing: 0.15em; color: var(--accent-gold); text-transform: uppercase; font-weight: 500; }

        /* --- グリッド表示 --- */
        .article-list.grid-mode { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .article-list.grid-mode .article-card { padding: 15px; border-radius: 6px; }
        .article-list.grid-mode .img-wrapper { aspect-ratio: 1 / 1; margin-bottom: 12px; }
        .article-list.grid-mode .article-card h2 { font-size: 1.15rem; margin-bottom: 8px; }
        .article-list.grid-mode .article-card p { font-size: 0.75rem; line-height: 1.6; margin-bottom: 12px; display: -webkit-box
