<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>teru_luce_ Links</title>
    <style>
        /* 全体の背景デザイン：夜のパークをイメージした深い青と紫のグラデーション */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background: radial-gradient(circle at top, #1a2a6c, #b21f1f, #fdbb2d); /* 魔法のようなグラデーション */
            background-attachment: fixed;
            background-size: cover;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 魔法のキラキラした背景効果（実験的要素） */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(white 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.2;
            z-index: 0;
        }

        /* メインのカード */
        .container {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.1); /* ガラスのような透け感 */
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px 20px;
            border-radius: 30px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            animation: fadeIn 1.5s ease-out;
        }

        /* アイコン画像 */
        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #fff;
            box-shadow: 0 0 20px rgba(255,255,255,0.5);
            margin-bottom: 20px;
        }

        /* アカウント名 */
        h1 {
            font-size: 1.5rem;
            letter-spacing: 0.1rem;
            margin-bottom: 10px;
            font-weight: bold;
        }

        /* 自己紹介文 */
        .bio {
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        /* リンクボタンのエリア */
        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* ボタンのデザイン */
        .btn {
            text-decoration: none;
            color: white;
            background: rgba(255, 255, 255, 0.15);
            padding: 15px;
            border-radius: 15px;
            font-weight: bold;
            transition: all 0.3s ease; /* 動きをなめらかに */
            border: 1px solid rgba(255, 255, 255, 0.3);
            display: block;
        }

        /* 【実験】ホバー時の動き：浮き上がって光る */
        .btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-5px); /* 上に浮かぶ */
            box-shadow: 0 10px 20px rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 1);
        }

        /* 登場アニメーション */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        footer {
            margin-top: 30px;
            font-size: 0.7rem;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- アイコン画像（icon.jpgという名前の画像を表示します） -->
        <img src="icon.jpg" alt="teru_luce_" class="profile-img">

        <h1>teru_luce_</h1>

        <p class="bio">
            自分なりにディズニーの世界を切り取っています。<br>
            光と魔法が溢れる瞬間を。
        </p>

        <div class="links">
            <!-- 各SNSへのリンク -->
            <a href="https://www.instagram.com/teru_luce_?igsh=MWV4bjlocXR0MXJmdw%3D%3D&utm_source=qr" class="btn" target="_blank">Instagram (Main)</a>
            <a href="https://www.instagram.com/teru_diario_?igsh=M25raDdsYmJlcWww&utm_source=qr" class="btn" target="_blank">Instagram (Diario)</a>
            <a href="https://x.com/teru_luce?s=21" class="btn" target="_blank">X (Twitter)</a>
        </div>

        <footer>
            &copy; teru_luce_
        </footer>
    </div>

</body>
</html>
