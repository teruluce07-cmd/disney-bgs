<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TDS BGS & Photography | HOME</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400;1,600&family=Noto+Serif+JP:wght@200;300;400&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #080A12; 
            --text-main: #D1D5DB; 
            --accent-gold: #A88E5E; 
            --border-light: rgba(255, 255, 255, 0.1);
            --img-filter: brightness(0.8) sepia(10%);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Noto Serif JP', serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 50%, transparent 30%, rgba(0,0,0,0.5) 100%);
            color: var(--text-main);
            line-height: 2.2;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .noise-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; z-index: 9999; opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        .container { max-width: 540px; margin: 0 auto; padding: 40px 25px 100px; }

        .reveal {
            opacity: 0; transform: translateY(30px);
            transition: all 1.1s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .reveal.active { opacity: 1; transform: translateY(0); }

        /* --- ヘッダー（右上にプロフィールボタン） --- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            margin-bottom: 60px;
            border-bottom: 1px solid var(--border-light);
        }
        
        .header-logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.5rem;
            letter-spacing: 0.1em;
            color: #fff;
            text-decoration: none;
        }

        .profile-btn {
            display: inline-block;
            text-decoration: none;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.7rem;
            letter-spacing: 0.25em;
            color: var(--accent-gold);
            border: 1px solid var(--accent-gold);
            padding: 10px 20px;
            border-radius: 40px;
            text-transform: uppercase;
            transition: all 0.4s ease;
        }
        .profile-btn:hover {
            background-color: var(--accent-gold);
            color: var(--bg-color);
            box-shadow: 0 0 15px rgba(168, 142, 94, 0.4);
        }

        /* 導入文 */
        .intro-text {
            text-align: center;
            margin-bottom: 60px;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 0.05em;
        }

        /* --- メインの記事カード --- */
        .article-card {
            text-decoration: none;
            color: var(--text-main);
            display: block;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-light);
            border-radius: 8px;
            padding: 25px;
            transition: all 0.4s ease;
        }
        .article-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-gold);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }

        .img-wrapper {
            width: 100%;
            aspect-ratio: 16 / 10;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .img-wrapper img {
            width: 100%; height: 100%;
            object-fit: cover;
            filter: var(--img-filter);
            transition: transform 1.5s ease;
        }
        .article-card:hover .img-wrapper img {
            transform: scale(1.05);
        }

        .card-tag {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.65rem;
            letter-spacing: 0.25em;
            color: var(--accent-gold);
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .article-card h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.8rem;
            font-weight: 400;
            color: #fff;
            margin-bottom: 15px;
            letter-spacing: 0.05em;
        }

        .article-card p {
            font-size: 0.8rem;
            opacity: 0.7;
            line-height: 2;
            margin-bottom: 25px;
        }

        .read-btn {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.75rem;
            letter-spacing: 0.15em;
            color: var(--accent-gold);
            text-transform: uppercase;
            font-weight: 500;
        }

        footer {
            text-align: center;
            margin-top: 120px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.65rem;
            letter-spacing: 0.2em;
            opacity: 0.4;
        }
    </style>
</head>
<body>

    <div class="noise-overlay"></div>

    <div class="container">
        <!-- ヘッダー（右上プロフィール） -->
        <header class="header reveal">
            <a href="index.html" class="header-logo">TERU_LUCE_</a>
            <a href="profile.html" class="profile-btn">Profile</a>
        </header>

        <p class="intro-text reveal">
            自分なりにディズニーの世界を切り取っています。<br>
            光と魔法、そしてその背景に隠された真実。
        </p>

        <!-- メイン記事への導線（bgs-tot.htmlへ） -->
        <div class="reveal">
            <a href="bgs-tot.html" class="article-card">
                <div class="img-wrapper">
                    <!-- リネーム済みの美しいホテルの写真を表示 -->
                    <img src="tot-exterior.jpg" alt="Hotel Hightower">
                </div>
                <div class="card-tag">Featured Story</div>
                <h2>Tower of Terror</h2>
                <p>ニューヨーク1912。大富豪ハリソン・ハイタワー三世の失踪劇と、呪いの偶像シリキ・ウトゥンドゥが招いた一夜の真実。そしてディズニーシー全体を繋ぐ、隠された歴史の糸。</p>
                <div class="read-btn">Explore the Story →</div>
            </a>
        </div>

        <footer>&copy; TERU_LUCE_</footer>
    </div>

    <script>
        const reveals = document.querySelectorAll('.reveal');
        const revealOnScroll = new IntersectionObserver((entries, observer) => {
            entries.forEach(entry => {
                if (!entry.isIntersecting) return;
                entry.target.classList.add('active');
                observer.unobserve(entry.target);
            });
        }, { threshold: 0.1, rootMargin: "0px 0px -40px 0px" });
        reveals.forEach(reveal => revealOnScroll.observe(reveal));
        setTimeout(() => { reveals[0].classList.add('active'); }, 100);
    </script>
</body>
</html>
